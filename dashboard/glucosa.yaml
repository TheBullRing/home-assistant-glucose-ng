views:
  - title: Glucosa
    panel: true
    path: glucosa
    cards:
      - type: vertical-stack
        cards:
          - type: grid
            columns: 2
            square: false
            card_mod:
              style: |
                @media (max-width: 600px) {
                  #root {
                    grid-template-columns: 1fr !important;
                  }
                }
            cards:
              - type: custom:button-card
                entity: sensor.glucose_ng_javi_javi
                show_name: false
                show_state: true
                styles:
                  card:
                    - height: 160px
                    - border-radius: 18px
                    - box-shadow: none
                    - background: white
                  state:
                    - font-size: clamp(60px, 20vw, 90px)
                    - font-weight: 800
                    - line-height: 1
                    - color: |
                        [[[
                          const g = Number(entity.state);
                          if (isNaN(g)) return '#616161';
                          if (g < 70) return '#fdd835';
                          if (g <= 80) return '#fdd835';
                          if (g <= 180) return '#00c853';
                          if (g <= 200) return '#fdd835';
                          return '#d50000';
                        ]]]
                  grid:
                    - place-items: center
              - type: custom:button-card
                show_name: false
                tap_action:
                  action: none
                custom_fields:
                  arrow: |
                    [[[
                      const roc = Number(states['sensor.glucose_ng_javi_javi_rate']?.state || 0);
                      if (roc >= 2) return "↑";
                      if (roc >= 0.7) return "↗";
                      if (roc <= -2) return "↓";
                      if (roc <= -0.7) return "↘";
                      return "→";
                    ]]]
                  delta: |
                    [[[
                      const d = states['sensor.glucose_ng_javi_javi_delta']?.state ?? '—';
                      return `<div style="font-size:26px;color:#616161;">Δ ${d}</div>`;
                    ]]]
                styles:
                  card:
                    - height: 160px
                    - border-radius: 18px
                    - box-shadow: none
                    - background: white
                  custom_fields:
                    arrow:
                      - font-size: clamp(50px, 18vw, 86px)
                      - font-weight: 900
                      - line-height: 1
                      - color: |
                          [[[
                            const g = Number(states['sensor.glucose_ng_javi_javi']?.state);
                            if (isNaN(g)) return '#616161';
                            if (g < 70) return '#fdd835';
                            if (g <= 80) return '#fdd835';
                            if (g <= 180) return '#00c853';
                            if (g <= 200) return '#fdd835';
                            return '#d50000';
                          ]]]
                    delta:
                      - margin-top: '-10px'
                  grid:
                    - grid-template-areas: '"arrow" "delta"'
                    - grid-template-rows: 1fr auto
                    - place-items: center
          - type: markdown
            content: >
              <div
              style="display:flex;gap:26px;justify-content:center;align-items:center;padding:6px;">
                <div style="font-size:22px;color:#757575;">
                  🕒 {{
                    ((as_timestamp(now()) -
                      as_timestamp(states.sensor.glucose_ng_javi_javi.last_updated))
                      / 60) | round(0)
                  }} min
                </div>
                <div style="font-size:22px;color:#757575;">
                  Δ {{ states('sensor.glucose_ng_javi_javi_delta') }}
                </div>
              </div>
            card_mod:
              style: |
                ha-card { box-shadow: none; background: transparent; }
          - type: custom:plotly-graph
            hours_to_show: 24
            refresh_interval: 30
            layout:
              template: simple_white
              paper_bgcolor: rgba(0,0,0,0)
              plot_bgcolor: rgba(0,0,0,0)
              height: 360
              showlegend: false
              margin:
                l: 36
                r: 12
                t: 6
                b: 28
              dragmode: pan
              xaxis:
                type: date
                tickformat: '%H:%M'
                ticks: outside
                showgrid: true
                gridcolor: '#e0e0e0'
                gridwidth: 1
                fixedrange: false
                rangeselector:
                  'y': 1.05
                  buttons:
                    - count: 6
                      step: hour
                      stepmode: backward
                      label: 6h
                    - count: 12
                      step: hour
                      stepmode: backward
                      label: 12h
                    - count: 24
                      step: hour
                      stepmode: backward
                      label: 24h
              yaxis:
                range:
                  - 50
                  - null
                fixedrange: true
                showgrid: false
                zeroline: false
                showline: false
              shapes:
                - type: line
                  xref: paper
                  yref: 'y'
                  x0: 0
                  x1: 1
                  y0: 70
                  y1: 70
                  layer: above
                  line:
                    color: '#9e9e9e'
                    width: 1.5
                    dash: solid
                - type: line
                  xref: paper
                  yref: 'y'
                  x0: 0
                  x1: 1
                  y0: 80
                  y1: 80
                  layer: above
                  line:
                    color: '#9e9e9e'
                    width: 1.5
                    dash: solid
                - type: line
                  xref: paper
                  yref: 'y'
                  x0: 0
                  x1: 1
                  y0: 180
                  y1: 180
                  layer: above
                  line:
                    color: '#9e9e9e'
                    width: 1.5
                    dash: solid
                - type: line
                  xref: paper
                  yref: 'y'
                  x0: 0
                  x1: 1
                  y0: 200
                  y1: 200
                  layer: above
                  line:
                    color: '#9e9e9e'
                    width: 1.5
                    dash: solid
            config:
              displayModeBar: true
              modeBarButtonsToAdd:
                - zoom2d
                - pan2d
                - autoScale2d
                - resetScale2d
              scrollZoom: true
              responsive: true
            defaults:
              entity:
                mode: lines
                line:
                  shape: linear
                  width: 4
                connectgaps: false
            entities:
              - entity: sensor.glucose_ng_javi_javi
                name: 80–180
                line:
                  color: '#00c853'
                  width: 4
                filters:
                  - fn: |
                      ({ ys }) => ({
                        ys: ys.map(y => {
                          const v = Number(y);
                          return (!Number.isNaN(v) && v >= 80 && v <= 180) ? v : null;
                        })
                      })
              - entity: sensor.glucose_ng_javi_javi
                name: 70–80
                line:
                  color: '#fdd835'
                  width: 4
                filters:
                  - fn: |
                      ({ ys }) => ({
                        ys: ys.map(y => {
                          const v = Number(y);
                          return (!Number.isNaN(v) && v >= 70 && v < 80) ? v : null;
                        })
                      })
              - entity: sensor.glucose_ng_javi_javi
                name: 180–200
                line:
                  color: '#fdd835'
                  width: 4
                filters:
                  - fn: |
                      ({ ys }) => ({
                        ys: ys.map(y => {
                          const v = Number(y);
                          return (!Number.isNaN(v) && v >= 180 && v <= 200) ? v : null;
                        })
                      })
              - entity: sensor.glucose_ng_javi_javi
                name: <70
                line:
                  color: '#fdd835'
                  width: 4
                filters:
                  - fn: |
                      ({ ys }) => ({
                        ys: ys.map(y => {
                          const v = Number(y);
                          return (!Number.isNaN(v) && v < 70) ? v : null;
                        })
                      })
              - entity: sensor.glucose_ng_javi_javi
                name: '>200'
                line:
                  color: '#d50000'
                  width: 4
                filters:
                  - fn: |
                      ({ ys }) => ({
                        ys: ys.map(y => {
                          const v = Number(y);
                          return (!Number.isNaN(v) && v > 200) ? v : null;
                        })
                      })
