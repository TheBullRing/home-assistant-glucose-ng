name: Hassfest

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hassfest validation
        uses: home-assistant/actions/hassfest@master
